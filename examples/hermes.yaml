name: harness-control-api
type: service
workspace_fqn: YOUR_CLUSTER:YOUR_WORKSPACE
image:
  type: build
  build_source:
    type: git
    repo_url: https://github.com/truefoundry/tfy-hermes-agent
    branch_name: main
    ref: main
  build_spec:
    type: dockerfile
    dockerfile_path: Dockerfile.control-api
    build_context_path: .
resources:
  cpu_request: 0.25
  cpu_limit: 1
  memory_request: 512
  memory_limit: 1024
  ephemeral_storage_request: 2000
  ephemeral_storage_limit: 4000
replicas: 1
env:
  PORT: "8787"
  HARNESS_STATE_DIR: /data/state
  PUBLIC_BASE_URL: https://YOUR-HERMES-CONTROL-HOST
  TFY_BASE_URL: https://YOUR-TFY-HOST
  TFY_API_KEY: tfy-secret://YOUR_TENANT:YOUR_SECRET_GROUP:TFY-GATEWAY-API-KEY
  TFY_GATEWAY_API_KEY: tfy-secret://YOUR_TENANT:YOUR_SECRET_GROUP:TFY-GATEWAY-API-KEY
  TFY_GATEWAY_BASE_URL: tfy-secret://YOUR_TENANT:YOUR_SECRET_GROUP:TFY-GATEWAY-BASE-URL
  TFY_WORKSPACE_FQN: YOUR_CLUSTER:YOUR_WORKSPACE
  HERMES_INFERENCE_MODEL: openai-main/gpt-5.5
  HERMES_JOB_APPLICATION_NAME: hermes-turn-runner
ports:
  - port: 8787
    expose: true
    host: YOUR-HERMES-CONTROL-HOST
    app_protocol: http
mounts:
  - type: volume
    mount_path: /data
    volume_fqn: tfy-volume://YOUR_CLUSTER:YOUR_WORKSPACE:hermes-control-state
