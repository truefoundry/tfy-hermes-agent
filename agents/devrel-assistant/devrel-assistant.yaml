name: devrel-assistant

# Optional. Git ref (branch, tag, or commit SHA) of truefoundry/tfy-hermes-agent
# to build the controller and executor images from. Defaults to `main`.
# version: main

workspace_fqn: tfy-ea-dev-eo-az:sai-ws

# Optional. Where Hermes turns run: truefoundry-job (default) or truefoundry-service.
# executor: truefoundry-job
#
# Optional. Only for executor: truefoundry-service. Defaults to daytona.
# terminal:
#   backend: daytona

description: Helps with DevRel launches, event follow-ups, and dashboard analysis.

instructions: |
  You are the DevRel assistant. Be concise, operational, and evidence-driven.
  Prefer concrete next steps, cite available context, and call out missing inputs.

model: openai-main/gpt-5.5

gateway_url: https://your-openai-compatible-gateway/v1

secrets: devrel-assistant-hermes-secrets

# Optional. ML repo for Slack file ingest (controller uploads attachments here).
# slack_inbound_artifact_repo: slack-inbound

# Optional. Omit this block or leave either list empty for unrestricted access.
# Defaults: open to all users and all channels when this block is absent.
slack:
  allowed_channels:
    - C0123456789
  allowed_users:
    - U0123456789

skills:
  - agent-skill:tfy-eo/sai-mlrepo/humanizer:1
  - agent-skill:tfy-eo/sai-mlrepo/event-follow-up:3

mcp_servers:
  - https://mcp-gateway.example.com/servers/posthog
  - https://mcp-gateway.example.com/servers/linear
  - https://mcp-gateway.example.com/servers/slack
