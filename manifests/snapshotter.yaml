name: ${HERMES_AGENT_HANDLE}-snapshotter
type: job
workspace_fqn: ${TFY_WORKSPACE_FQN}
trigger:
  type: manual
concurrency_limit: 1
retries: 1
image:
  type: build
  build_source:
    type: git
    repo_url: ${HERMES_REPO_URL}
    ref: ${HERMES_SOURCE_REF}
  build_spec:
    type: dockerfile
    dockerfile_path: Dockerfile.snapshotter
    build_context_path: .
    command: node snapshotter/snapshotter.mjs
resources:
  cpu_request: 0.1
  cpu_limit: 0.5
  memory_request: 256
  memory_limit: 512
  ephemeral_storage_request: 1000
  ephemeral_storage_limit: 2000
env:
  HARNESS_STATE_DIR: /data/state
  HERMES_SNAPSHOT_DIR: /data/snapshots
  HERMES_SNAPSHOT_RETAIN_COUNT: "50"
  HERMES_SNAPSHOT_DISABLE_ARTIFACT_UPLOAD: "${HERMES_SNAPSHOT_DISABLE_ARTIFACT_UPLOAD}"
  HERMES_SNAPSHOT_ML_REPO: "${HERMES_SNAPSHOT_ML_REPO}"
  HERMES_SNAPSHOT_ARTIFACT_NAME: "${HERMES_SNAPSHOT_ARTIFACT_NAME}"
  HERMES_AGENT_HANDLE: ${HERMES_AGENT_HANDLE}
  TFY_BASE_URL: tfy-secret://${TFY_SECRET_TENANT}:${HERMES_AGENT_SECRET_GROUP}:TFY_HOST
  TFY_HOST: tfy-secret://${TFY_SECRET_TENANT}:${HERMES_AGENT_SECRET_GROUP}:TFY_HOST
  TFY_API_KEY: tfy-secret://${TFY_SECRET_TENANT}:${HERMES_AGENT_SECRET_GROUP}:TFY_API_KEY
  TFY_PLATFORM_API_KEY: tfy-secret://${TFY_SECRET_TENANT}:${HERMES_AGENT_SECRET_GROUP}:TFY_API_KEY
  TFY_SECRET_TENANT: ${TFY_SECRET_TENANT}
  TFY_WORKSPACE_FQN: ${TFY_WORKSPACE_FQN}
mounts:
  - type: volume
    mount_path: /data
    volume_fqn: tfy-volume://${TFY_WORKSPACE_FQN}:${HERMES_AGENT_HANDLE}-state
