name: hermes-api
type: service
workspace_fqn: YOUR_CLUSTER:YOUR_WORKSPACE
image:
  type: build
  build_source:
    type: git
    repo_url: https://github.com/truefoundry/tfy-hermes-agent
    branch_name: main
    ref: main
  build_spec:
    type: dockerfile
    dockerfile_path: Dockerfile.control-api
    build_context_path: .
resources:
  cpu_request: 0.25
  cpu_limit: 1
  memory_request: 512
  memory_limit: 1024
  ephemeral_storage_request: 2000
  ephemeral_storage_limit: 4000
replicas: 1
env:
  PORT: "8787"
  HARNESS_STATE_DIR: /data/state
  PUBLIC_BASE_URL: https://YOUR-HERMES-API-HOST
  HARNESS_API_URL: https://YOUR-HERMES-API-HOST
  TFY_BASE_URL: https://YOUR-TFY-HOST
  TFY_HOST: https://YOUR-TFY-HOST
  TFY_SERVICE_API_URL: https://YOUR-TFY-HOST
  TFY_API_KEY: tfy-secret://YOUR_TENANT:YOUR_AGENT_SECRET_GROUP:TFY-GATEWAY-API-KEY
  TFY_GATEWAY_API_KEY: tfy-secret://YOUR_TENANT:YOUR_AGENT_SECRET_GROUP:TFY-GATEWAY-API-KEY
  TFY_GATEWAY_BASE_URL: tfy-secret://YOUR_TENANT:YOUR_AGENT_SECRET_GROUP:TFY-GATEWAY-BASE-URL
  SLACK_BOT_TOKEN: tfy-secret://YOUR_TENANT:YOUR_AGENT_SECRET_GROUP:SLACK-BOT-TOKEN
  SLACK_SIGNING_SECRET: tfy-secret://YOUR_TENANT:YOUR_AGENT_SECRET_GROUP:SLACK-SIGNING-SECRET
  SLACK_REDIRECT_URI: https://YOUR-HERMES-API-HOST/slack/oauth/callback
  TFY_SECRET_TENANT: YOUR_TENANT
  TFY_WORKSPACE_FQN: YOUR_CLUSTER:YOUR_WORKSPACE
  HERMES_AGENT_HANDLE: your-agent-handle
  HERMES_AGENT_NAME: Your Agent Name
  HERMES_AGENT_DESCRIPTION: Your standalone Hermes Slack agent.
  HERMES_AGENT_INSTRUCTIONS: |
    Replace this with the agent's operating instructions.
  HERMES_AGENT_SKILLS: ""
  HERMES_AGENT_MCP_SERVERS: ""
  HERMES_AGENT_SECRET_REFS: ""
  HARNESS_MODEL: openai-main/gpt-5.5
  HERMES_INFERENCE_MODEL: openai-main/gpt-5.5
  HERMES_JOB_APPLICATION_NAME: hermes-turn-runner
  HERMES_SLACK_RUN_TIMEOUT_MS: "120000"
  HERMES_SLACK_STATUS_TEXT: "is thinking..."
  HERMES_SLACK_LOADING_MESSAGES: "Reading the thread|Planning the next step|Running Hermes|Preparing the reply"
  HERMES_SLACK_STREAM_CHUNK_DELAY_MS: "120"
  HERMES_SLACK_CREATE_USERGROUPS: "false"
  HERMES_SLACK_REQUIRE_CHANNEL_DEPLOYMENT: "false"
  HARNESS_EXECUTION_RUNNER: truefoundry-jobs
  HARNESS_CREDENTIAL_BROKER: truefoundry-secretgroup
  HARNESS_SANDBOX_PROVIDER: daytona
  HARNESS_SANDBOX_SCOPE: agent-session
  HARNESS_SANDBOX_IDLE_TIMEOUT_SECONDS: "900"
ports:
  - port: 8787
    expose: true
    host: YOUR-HERMES-API-HOST
    app_protocol: http
mounts:
  - type: volume
    mount_path: /data
    volume_fqn: tfy-volume://YOUR_CLUSTER:YOUR_WORKSPACE:hermes-control-state
