name: ${CONTROL_API_NAME}
type: service
workspace_fqn: ${TFY_WORKSPACE_FQN}
image:
  type: build
  build_source:
    type: git
    repo_url: ${HERMES_REPO_URL}
    branch_name: ${HERMES_SOURCE_BRANCH}
    ref: ${HERMES_SOURCE_REF}
  build_spec:
    type: dockerfile
    dockerfile_path: Dockerfile.control-api
    build_context_path: .
resources:
  cpu_request: 0.25
  cpu_limit: 1
  memory_request: 512
  memory_limit: 1024
  ephemeral_storage_request: 2000
  ephemeral_storage_limit: 4000
replicas: 1
env:
  NODE_ENV: production
  PORT: "8787"
  HOME: /data/home
  HARNESS_STATE_DIR: /data/state
  PUBLIC_BASE_URL: https://${CONTROL_API_HOST}
  HARNESS_API_URL: https://${CONTROL_API_HOST}
  TFY_BASE_URL: ${TFY_BASE_URL}
  TFY_HOST: ${TFY_BASE_URL}
  TFY_SERVICE_API_URL: ${TFY_BASE_URL}
  TFY_API_KEY: ${GATEWAY_API_KEY_REF}
  TFY_GATEWAY_API_KEY: ${GATEWAY_API_KEY_REF}
  TFY_GATEWAY_BASE_URL: ${GATEWAY_BASE_URL_REF}
  TFY_SECRET_TENANT: ${TFY_SECRET_TENANT}
  TFY_WORKSPACE_FQN: ${TFY_WORKSPACE_FQN}
  HARNESS_MODEL: ${HERMES_MODEL}
  HERMES_INFERENCE_MODEL: ${HERMES_MODEL}
  HERMES_JOB_APPLICATION_NAME: ${TURN_RUNNER_NAME}
  HERMES_SKILLS_REGISTRY_URL: "${HERMES_SKILLS_REGISTRY_URL}"
  HARNESS_EXECUTION_RUNNER: truefoundry-jobs
  HARNESS_CREDENTIAL_BROKER: truefoundry-secretgroup
  HARNESS_SANDBOX_PROVIDER: daytona
  HARNESS_SANDBOX_SCOPE: agent-session
  HARNESS_SANDBOX_IDLE_TIMEOUT_SECONDS: "900"
ports:
  - port: 8787
    expose: true
    host: ${CONTROL_API_HOST}
    app_protocol: http
mounts:
  - type: volume
    mount_path: /data
    volume_fqn: tfy-volume://${TFY_WORKSPACE_FQN}:${CONTROL_VOLUME_NAME}
liveness_probe:
  config:
    type: http
    path: /api/health
    port: 8787
    scheme: HTTP
  initial_delay_seconds: 20
  period_seconds: 15
  timeout_seconds: 5
  failure_threshold: 5
readiness_probe:
  config:
    type: http
    path: /api/health
    port: 8787
    scheme: HTTP
  initial_delay_seconds: 20
  period_seconds: 15
  timeout_seconds: 5
  failure_threshold: 5
rollout_strategy:
  type: rolling_update
  max_surge_percentage: 0
  max_unavailable_percentage: 100
