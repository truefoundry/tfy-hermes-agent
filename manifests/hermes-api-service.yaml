name: hermes-api
type: service
workspace_fqn: ${TFY_WORKSPACE_FQN}
image:
  type: build
  build_source:
    type: git
    repo_url: ${HERMES_REPO_URL}
    branch_name: main
    ref: ${HERMES_SOURCE_REF}
  build_spec:
    type: dockerfile
    dockerfile_path: Dockerfile.hermes-api
    build_context_path: .
resources:
  cpu_request: 0.5
  cpu_limit: 2
  memory_request: 1024
  memory_limit: 4096
  ephemeral_storage_request: 4000
  ephemeral_storage_limit: 8000
replicas: 1
env:
  HOME: /opt/hermes
  HERMES_HOME: /opt/hermes
  PORT: "8642"
  TFY_GATEWAY_BASE_URL: tfy-secret://${TFY_SECRET_TENANT}:codex-tfy-gateway-secrets:TFY-GATEWAY-BASE-URL
  TFY_GATEWAY_API_KEY: tfy-secret://${TFY_SECRET_TENANT}:codex-tfy-gateway-secrets:TFY-GATEWAY-API-KEY
  HERMES_INFERENCE_MODEL: openai-main/gpt-5.5
ports:
  - port: 8642
    expose: true
    host: ${HERMES_API_HOST}
    app_protocol: http
mounts:
  - type: volume
    mount_path: /opt/hermes
    volume_fqn: tfy-volume://${TFY_WORKSPACE_FQN}:hermes-state
liveness_probe:
  config:
    type: http
    path: /health
    port: 8642
    scheme: HTTP
  initial_delay_seconds: 20
  period_seconds: 15
  timeout_seconds: 5
  failure_threshold: 5
readiness_probe:
  config:
    type: http
    path: /health
    port: 8642
    scheme: HTTP
  initial_delay_seconds: 20
  period_seconds: 15
  timeout_seconds: 5
  failure_threshold: 5
