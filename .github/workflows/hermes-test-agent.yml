name: Hermes Test Agent

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_VERSION: "22"
  PYTHON_VERSION: "3.11"
  HERMES_TEST_AGENT_CONFIG: examples/tfy-eo-test-agent/hermes-test-agent.yaml
  HERMES_TEST_AGENT_HOST: https://hermes-test-agent-sai-ws.ml.tfy-eo.truefoundry.cloud
  TFY_HOST: https://tfy-eo.truefoundry.cloud

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: npm run check

  deploy-hermes-test-agent:
    name: Deploy and Smoke Hermes Test Agent
    runs-on: ubuntu-latest
    needs: check
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    env:
      TFY_API_KEY: ${{ secrets.TFY_EO_API_KEY }}
      HERMES_TEST_AGENT_API_KEY: ${{ secrets.TFY_EO_API_KEY }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Node dependencies
        run: npm ci

      - name: Install TrueFoundry CLI
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade "truefoundry"
          tfy version

      - name: Prepare exact-commit deploy config
        run: |
          node --input-type=module <<'NODE'
          import { mkdirSync, readFileSync, writeFileSync } from "node:fs";
          import { dirname, join } from "node:path";
          import YAML from "yaml";

          const target = join(process.env.RUNNER_TEMP, "hermes-test-agent.yaml");
          const doc = YAML.parseDocument(readFileSync(process.env.HERMES_TEST_AGENT_CONFIG, "utf8"));
          doc.set("version", process.env.GITHUB_SHA);
          mkdirSync(dirname(target), { recursive: true });
          writeFileSync(target, String(doc));
          console.log(target);
          NODE

      - name: Deploy manifests
        run: |
          node bin/tfy-hermes-agent.mjs deploy "$RUNNER_TEMP/hermes-test-agent.yaml" \
            --update \
            --emit-manifests "$RUNNER_TEMP/hermes-test-agent-deployments"

      - name: Force image rebuilds
        run: |
          tfy deploy --force -f "$RUNNER_TEMP/hermes-test-agent-deployments/hermes-test-agent-controller.yaml"
          tfy deploy --force -f "$RUNNER_TEMP/hermes-test-agent-deployments/hermes-test-agent-executor.yaml"
          if [ -f "$RUNNER_TEMP/hermes-test-agent-deployments/hermes-test-agent-artifact-cleanup.yaml" ]; then
            tfy deploy --force -f "$RUNNER_TEMP/hermes-test-agent-deployments/hermes-test-agent-artifact-cleanup.yaml"
          fi

      - name: Run live smoke tests
        run: npm run smoke:live
