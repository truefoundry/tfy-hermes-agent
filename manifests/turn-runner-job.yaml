name: hermes-turn-runner
type: job
workspace_fqn: ${TFY_WORKSPACE_FQN}
trigger:
  type: manual
concurrency_limit: 20
retries: 0
image:
  type: build
  build_source:
    type: git
    repo_url: ${HERMES_REPO_URL}
    branch_name: main
    ref: ${HERMES_SOURCE_REF}
  build_spec:
    type: dockerfile
    dockerfile_path: Dockerfile.turn-runner
    build_context_path: .
resources:
  cpu_request: 0.5
  cpu_limit: 2
  memory_request: 2048
  memory_limit: 4096
  ephemeral_storage_request: 8000
  ephemeral_storage_limit: 16000
env:
  HOME: /workspace
  HERMES_HOME: /workspace/.hermes
  HARNESS_WORKSPACE_ROOT: /workspace
  HARNESS_CONTROL_API_URL: https://${CONTROL_API_HOST}
  TFY_BASE_URL: tfy-secret://${TFY_SECRET_TENANT}:codex-tfy-gateway-secrets:TFY-GATEWAY-BASE-URL
  TFY_API_KEY: tfy-secret://${TFY_SECRET_TENANT}:codex-tfy-gateway-secrets:TFY-GATEWAY-API-KEY
  TFY_GATEWAY_BASE_URL: tfy-secret://${TFY_SECRET_TENANT}:codex-tfy-gateway-secrets:TFY-GATEWAY-BASE-URL
  TFY_GATEWAY_API_KEY: tfy-secret://${TFY_SECRET_TENANT}:codex-tfy-gateway-secrets:TFY-GATEWAY-API-KEY
  TFY_SECRET_TENANT: ${TFY_SECRET_TENANT}
  TFY_WORKSPACE_FQN: ${TFY_WORKSPACE_FQN}
  HERMES_INFERENCE_MODEL: openai-main/gpt-5.5
  HARNESS_EXECUTION_RUNNER: truefoundry-jobs
  HARNESS_PLATFORM_PROVIDER: truefoundry
  HARNESS_EXECUTION_PROVIDER: harness-runtime-router
  HARNESS_RUNTIME_ADAPTER: harness-runtime-router
  HARNESS_SANDBOX_PROVIDER: daytona
